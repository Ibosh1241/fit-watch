name: Build APKs

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build APKs (watch + phone)
        run: gradle :app:assembleDebug :phone:assembleDebug --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk fit-trainer-watch.apk
          cp phone/build/outputs/apk/debug/phone-debug.apk fit-trainer-phone.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fit-trainer-apks
          path: |
            fit-trainer-watch.apk
            fit-trainer-phone.apk
          if-no-files-found: error

      - name: Publish to Releases (direct download links)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Последняя сборка"
          files: |
            fit-trainer-watch.apk
            fit-trainer-phone.apk
