<style>
  :root{
    --flame:#FF6B35; --flame-deep:#F0481E; --amber:#FFB020;
    --good:#2DD4A7; --warn:#FFB020; --bad:#EF4444;
    --bg:#EDEFF3; --bg2:#F5F6F9; --surface:#FFFFFF; --elev:#FFFFFF;
    --line:#E1E4EA; --text:#161B22; --muted:#616B79; --faint:#98A1AD; --track:#E6E9EF; --stage:#FFFFFF;
    --shadow:0 1px 2px rgba(18,24,32,.06), 0 10px 26px rgba(18,24,32,.07);
    --nav-bg:rgba(255,255,255,.9); --grad:linear-gradient(135deg,#FF6B35,#F0481E); --glow:rgba(255,107,53,.1);
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#0E1116;--bg2:#0A0D11;--surface:#161B22;--elev:#1E242E;--line:#28303B;--text:#E9ECF1;--muted:#96A0AD;--faint:#5D6675;--track:#232A34;--stage:#F4F5F7;--shadow:0 1px 2px rgba(0,0,0,.5),0 14px 34px rgba(0,0,0,.4);--nav-bg:rgba(16,20,26,.9);--glow:rgba(255,107,53,.16)}
  }
  :root[data-theme="light"]{--bg:#EDEFF3;--bg2:#F5F6F9;--surface:#FFFFFF;--elev:#FFFFFF;--line:#E1E4EA;--text:#161B22;--muted:#616B79;--faint:#98A1AD;--track:#E6E9EF;--stage:#FFFFFF;--shadow:0 1px 2px rgba(18,24,32,.06),0 10px 26px rgba(18,24,32,.07);--nav-bg:rgba(255,255,255,.9);--glow:rgba(255,107,53,.1)}
  :root[data-theme="dark"]{--bg:#0E1116;--bg2:#0A0D11;--surface:#161B22;--elev:#1E242E;--line:#28303B;--text:#E9ECF1;--muted:#96A0AD;--faint:#5D6675;--track:#232A34;--stage:#F4F5F7;--shadow:0 1px 2px rgba(0,0,0,.5),0 14px 34px rgba(0,0,0,.4);--nav-bg:rgba(16,20,26,.9);--glow:rgba(255,107,53,.16)}

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg2)}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;color:var(--text);font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums}
  .app{max-width:480px;margin:0 auto;height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden}
  .main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .pad{padding:18px 16px 26px}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:700}
  h1{font-size:25px;line-height:1.15;margin:0;font-weight:800;letter-spacing:-.02em;text-wrap:balance}
  h2{font-size:18px;margin:0;font-weight:750;letter-spacing:-.01em}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
  .card.p{padding:16px}
  .stack{display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:center;gap:12px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .hero{position:relative;border-radius:22px;padding:20px;overflow:hidden;color:#fff;background:var(--grad);box-shadow:0 12px 30px rgba(240,72,30,.32)}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.22),transparent 70%)}
  .hero .eyebrow{color:rgba(255,255,255,.85)} .hero h1{color:#fff}
  .btn{appearance:none;border:1px solid var(--line);font:inherit;font-weight:700;cursor:pointer;border-radius:14px;padding:13px 16px;background:var(--elev);color:var(--text);display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--grad);color:#fff;border:none;box-shadow:0 8px 20px rgba(240,72,30,.3)}
  .btn.ghost{background:transparent}
  .btn.wide{width:100%} .btn.sm{padding:9px 12px;border-radius:11px;font-size:14px}
  .btn.on-hero{background:#fff;color:var(--flame-deep);border:none}
  .chip{border:1px solid var(--line);background:var(--elev);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
  .chip.act{background:var(--grad);color:#fff;border-color:transparent}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .tile{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:12px}
  .tile .k{font-size:22px;font-weight:800;letter-spacing:-.02em} .tile .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-top:2px}
  label.fld{display:block} .fld .cap{font-size:12px;color:var(--muted);font-weight:600;margin:0 0 6px 2px}
  input,select{width:100%;font:inherit;font-size:16px;color:var(--text);background:var(--bg2);border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;outline:none}
  input:focus,select:focus{border-color:var(--flame)}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .bar{height:9px;border-radius:99px;background:var(--track);overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:99px;background:var(--grad)}
  .bar.green>i{background:var(--good)}
  .kring{width:120px;height:120px;position:relative;flex-shrink:0}
  .kring svg{transform:rotate(-90deg)}
  .kring .c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .kring .c b{font-size:26px;font-weight:800;letter-spacing:-.02em} .kring .c s{font-size:11px;color:var(--muted);text-decoration:none}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--track);color:var(--muted)}
  .pill.flame{background:rgba(255,107,53,.14);color:var(--flame)}
  .pill.good{background:rgba(45,212,167,.16);color:var(--good)}
  .divider{height:1px;background:var(--line);margin:4px 0}
  .li{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)} .li:last-child{border-bottom:none}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--flame);flex-shrink:0}
  a.link{color:var(--flame);font-weight:600;text-decoration:none;cursor:pointer}

  /* video */
  .clip{width:100%;height:100%;object-fit:contain;display:block;background:#fff;border-radius:10px}
  .exthumb{width:66px;height:66px;flex-shrink:0;border-radius:12px;overflow:hidden;background:var(--stage);border:1px solid var(--line);position:relative;cursor:pointer}
  .exthumb video{width:100%;height:100%;object-fit:contain;background:#fff}
  .exthumb .pl{position:absolute;right:4px;bottom:4px;background:rgba(0,0,0,.6);color:#fff;border-radius:6px;font-size:9px;padding:1px 5px;font-weight:700}

  /* nav */
  .nav{flex-shrink:0;display:grid;grid-template-columns:repeat(5,1fr);background:var(--nav-bg);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .nav button{background:none;border:none;padding:8px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-weight:600;font-size:10px;cursor:pointer}
  .nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .nav button.act{color:var(--flame)}

  /* set rows */
  .exhead{display:flex;align-items:center;gap:12px;padding:2px 2px 10px}
  .setrow{display:grid;gap:8px;align-items:center;margin-bottom:8px}
  .setrow.gym{grid-template-columns:26px 1fr 1fr 46px}
  .setrow.bw{grid-template-columns:26px 1fr 46px}
  .setrow.tm{grid-template-columns:26px 1fr 46px}
  .setrow .sn{width:26px;height:26px;border-radius:50%;background:var(--track);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .setrow input{padding:10px;text-align:center;border-radius:11px}
  .setrow .tgt{background:var(--bg2);border:1.5px solid var(--line);border-radius:11px;padding:10px;text-align:center;font-weight:700;color:var(--muted)}
  .setrow .chk{width:46px;height:44px;border-radius:11px;border:1.5px solid var(--line);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted)}
  .setrow .chk svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
  .setrow.done .chk{background:var(--good);border-color:var(--good);color:#04231b}
  .setrow.done .sn{background:var(--good);color:#04231b} .setrow.done input,.setrow.done .tgt{opacity:.55}
  .unit{font-size:11px;color:var(--faint);text-align:center;font-weight:600}

  /* rest sheet */
  .rest{position:absolute;left:0;right:0;bottom:0;z-index:40;background:var(--surface);border-top:1px solid var(--line);box-shadow:0 -12px 30px rgba(0,0,0,.25);border-radius:20px 20px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:16px;transform:translateY(120%);transition:transform .28s cubic-bezier(.2,.8,.2,1)}
  .rest.show{transform:translateY(0)}
  .ring{width:78px;height:78px;flex-shrink:0;position:relative} .ring svg{transform:rotate(-90deg)}
  .ring .t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px}

  /* warmup */
  .warmstage{background:var(--stage);background-image:radial-gradient(120% 90% at 50% 8%,var(--glow),transparent 60%);border-radius:18px;padding:12px;display:flex;align-items:center;justify-content:center}
  .warmstage video{max-height:38vh;max-width:100%;border-radius:12px;background:#fff}
  .bigcount{font-size:56px;font-weight:800;letter-spacing:-.03em;text-align:center;line-height:1}

  /* plan grid */
  .weekrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)} .weekrow:last-child{border-bottom:none}
  .wk{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;background:var(--track);color:var(--muted);font-size:15px;line-height:1}
  .wk s{font-size:8px;font-weight:600;text-decoration:none;text-transform:uppercase}
  .weekrow.cur .wk{background:var(--grad);color:#fff}
  .weekrow.doneW .wk{background:var(--good);color:#04231b}
  .sdots{display:flex;gap:4px} .sdots i{width:8px;height:8px;border-radius:50%;background:var(--track)} .sdots i.on{background:var(--flame)}

  /* library grid */
  .lgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px;align-items:start}
  .lcard{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;cursor:pointer}
  .lstage{background:var(--stage);background-image:radial-gradient(120% 90% at 50% 10%,var(--glow),transparent 60%);height:150px;display:flex;align-items:center;justify-content:center;padding:6px}
  .lmeta{padding:10px 12px 13px} .lmeta .nm{font-weight:700;font-size:14px;line-height:1.25}

  /* modal */
  .ov{position:absolute;inset:0;background:rgba(8,10,14,.62);backdrop-filter:blur(4px);z-index:60;display:none;align-items:flex-end;justify-content:center}
  .ov.show{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:480px;border-radius:22px 22px 0 0;max-height:93%;overflow-y:auto;padding:8px 18px calc(24px + env(safe-area-inset-bottom))}
  .grab{width:40px;height:4px;border-radius:9px;background:var(--line);margin:8px auto 4px}
  .close{position:sticky;top:6px;float:right;background:var(--bg2);border:1px solid var(--line);width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--muted);z-index:2}
  .bigwrap{background:var(--stage);background-image:radial-gradient(120% 90% at 50% 8%,var(--glow),transparent 60%);border-radius:16px;padding:10px;margin-top:6px;display:flex;justify-content:center}
  .bigwrap video{max-height:46vh;max-width:100%;border-radius:12px;background:#fff}
  .sec{margin-top:16px} .sec h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:0 0 8px;font-weight:700}
  ol.steps{margin:0;padding:0;list-style:none;counter-reset:s}
  ol.steps li{counter-increment:s;position:relative;padding:0 0 12px 38px;font-size:14.5px;line-height:1.5}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:-1px;width:26px;height:26px;border-radius:8px;background:rgba(255,107,53,.14);color:var(--flame);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
  .note{display:flex;gap:10px;align-items:flex-start;background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:12px 13px;font-size:14px}
  ul.mis{margin:0;padding:0;list-style:none} ul.mis li{position:relative;padding:6px 0 6px 24px;font-size:14px;color:var(--muted)} ul.mis li::before{content:"\2715";position:absolute;left:0;color:var(--flame-deep);font-weight:800}
  .toast{position:absolute;left:50%;bottom:82px;transform:translateX(-50%) translateY(20px);background:#111820;color:#fff;padding:11px 18px;border-radius:12px;font-weight:600;font-size:14px;opacity:0;transition:.25s;z-index:80;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="app" id="app">
  <div class="main" id="screen"></div>
  <nav class="nav" id="nav"></nav>
  <div class="rest" id="restSheet"></div>
  <div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
  <div class="toast" id="toast"></div>
</div>

/* ---------- program ---------- */
const WARM = [
  {slug:"jumping-jack", sec:40},
  {slug:"high-knee-run", sec:30},
  {slug:"butt-kicks", sec:30},
  {slug:"bodyweight-squat", sec:30},
  {slug:"mountain-climber", sec:30},
];
const WORKOUTS = {
  A:{ title:"Тренировка A", base:[
      {slug:"bodyweight-squat",kind:"reps"},
      {slug:"push-up",kind:"reps"},
      {slug:"lat-pulldown",kind:"reps",gym:true},
      {slug:"glute-bridge",kind:"reps"},
      {slug:"plank",kind:"time"},
    ], unlock:[{slug:"dumbbell-lateral-raise",kind:"reps",gym:true,week:7}]},
  B:{ title:"Тренировка B", base:[
      {slug:"leg-press",kind:"reps",gym:true},
      {slug:"dumbbell-shoulder-press",kind:"reps",gym:true},
      {slug:"superman",kind:"reps"},
      {slug:"crunch",kind:"reps"},
      {slug:"side-bridge",kind:"time"},
    ], unlock:[{slug:"reverse-lunge",kind:"reps",week:5},{slug:"deadlift",kind:"reps",gym:true,week:9}]},
};
function prog(w){
  if(w<=2) return {ph:"Привыкание",  sets:2, reps:"12–15", rest:60,  plank:20};
  if(w<=4) return {ph:"База",        sets:3, reps:"12",    rest:75,  plank:30};
  if(w<=6) return {ph:"Прогресс",    sets:3, reps:"10–12", rest:90,  plank:40};
  if(w<=8) return {ph:"Сила",        sets:3, reps:"10",    rest:90,  plank:45};
  if(w<=10)return {ph:"Усложнение",  sets:4, reps:"8–10",  rest:100, plank:50};
  return      {ph:"Закрепление",     sets:4, reps:"8",     rest:120, plank:60};
}
const TOTAL_SESSIONS = 36; // 12 weeks × 3
function weekOf(done){ return Math.min(12, Math.floor(done/3)+1); }
function todayWhich(done){ return done%2===0 ? "A":"B"; }
function buildExercises(which, week){
  const p=prog(week), w=WORKOUTS[which];
  const list = w.base.concat(w.unlock.filter(u=>week>=u.week));
  return list.map(x=>{
    const info=BY[x.slug];
    const tgt = x.kind==="time" ? p.plank+" сек" : p.reps;
    return { slug:x.slug, name:info.name, kind:x.kind, gym:!!x.gym, rest:p.rest,
      sets:Array.from({length:p.sets},()=>({done:false,weight:"",reps:tgt})) , tgt};
  });
}

/* ---------- storage ---------- */
const KEY="fitcoach_v2";
function freshState(){return{profile:null,plan:{startDate:null,sessionsDone:0},history:[],weightLog:[],nutrition:{},route:"home",theme:"auto"};}
let S=load();
function load(){try{const r=JSON.parse(localStorage.getItem(KEY));if(r&&r.plan)return Object.assign(freshState(),r);}catch(e){}
  // migrate v1
  try{const o=JSON.parse(localStorage.getItem("fitcoach_v1"));if(o&&o.profile){const s=freshState();s.profile=o.profile;s.history=o.history||[];s.weightLog=o.weightLog||[];s.nutrition=o.nutrition||{};s.plan.startDate=todayKey();return s;}}catch(e){}
  return freshState();}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
const screen=$("#screen"),navEl=$("#nav"),restSheet=$("#restSheet"),ov=$("#ov"),sheet=$("#sheet");
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function todayKey(d){d=d||new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function clock(sec){sec=Math.max(0,Math.round(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;return h?h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"):m+":"+String(s).padStart(2,"0");}
function ruDate(d){d=d||new Date();const M=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];const W=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];return W[d.getDay()]+", "+d.getDate()+" "+M[d.getMonth()];}
let toastT;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1900);}
function targets(){const p=S.profile;if(!p)return{kcal:2200,protein:120};const bmr=10*p.weight+6.25*p.height-5*p.age+(p.sex==="f"?-161:5);const act={low:1.375,mid:1.55,high:1.725}[p.activity]||1.55;let k=bmr*act;if(p.goal==="lose")k-=400;else if(p.goal==="gain")k+=300;return{kcal:Math.round(k/10)*10,protein:Math.round(p.weight*1.8)};}
function streak(){const days=new Set(S.history.map(h=>h.date));let n=0,d=new Date();if(!days.has(todayKey(d)))d.setDate(d.getDate()-1);while(days.has(todayKey(d))){n++;d.setDate(d.getDate()-1);}return n;}
function curWeight(){return S.weightLog.length?S.weightLog[S.weightLog.length-1].kg:(S.profile?S.profile.weight:null);}
function ringSVG(pct,size,sw,color){const r=(size-sw)/2,c=2*Math.PI*r,off=c*(1-Math.max(0,Math.min(1,pct)));return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--track)" stroke-width="${sw}" fill="none"/><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${sw}" fill="none" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>`;}
let AC;function beep(){try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();[0,180,360].forEach(t=>{const o=AC.createOscillator(),g=AC.createGain();o.frequency.value=880;o.connect(g);g.connect(AC.destination);const s=AC.currentTime+t/1000;g.gain.setValueAtTime(.001,s);g.gain.exponentialRampToValueAtTime(.4,s+.02);g.gain.exponentialRampToValueAtTime(.001,s+.16);o.start(s);o.stop(s+.18);});}catch(e){}if(navigator.vibrate)navigator.vibrate([160,80,160]);}
function vhtml(slug,cls){return `<video class="${cls}" src="${BY[slug].src}" muted loop playsinline preload="metadata"></video>`;}
let io=new IntersectionObserver(es=>es.forEach(e=>{const v=e.target;if(e.isIntersecting){v.play&&v.play().catch(()=>{});}else{v.pause&&v.pause();}}),{threshold:.15});
function wireVideos(root){(root||document).querySelectorAll("video[data-io]").forEach(v=>{io.observe(v);v.play&&v.play().catch(()=>{});});}

function renderNav(){const hide=S.route==="session"||S.route==="onboarding";navEl.style.display=hide?"none":"grid";if(hide)return;

/* ---------- router ---------- */
function go(r){S.route=r;if(r!=="session")clearRest();save();render();screen.scrollTop=0;}
function render(){renderNav();
  if(!S.profile){S.route="onboarding";renderNav();return renderOnboarding();}
  ({home:renderHome,plan:renderPlan,exercises:renderExercises,progress:renderProgress,nutrition:renderNutrition,profile:renderProfile,session:renderSession}[S.route]||renderHome)();
}

/* ---------- onboarding ---------- */
function renderOnboarding(){clearRest();

function weightChart(wl){if(wl.length<2)return`<div class="faint" style="font-size:13px;padding:10px 0">Добавь минимум 2 записи, чтобы увидеть график.</div>`;
  const W=340,H=110,pad=8,ys=wl.map(p=>p.kg),mn=Math.min(...ys),mx=Math.max(...ys),rng=(mx-mn)||1;
  const X=i=>pad+i/(wl.length-1)*(W-2*pad),Y=v=>pad+(1-(v-mn)/rng)*(H-2*pad);
  const pts=wl.map((p,i)=>`${X(i).toFixed(1)},${Y(p.kg).toFixed(1)}`);
  const area=`M${pts[0]} `+pts.slice(1).map(p=>"L"+p).join(" ")+` L${X(wl.length-1).toFixed(1)},${H-pad} L${pad},${H-pad} Z`;
  return`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;margin-top:6px"><defs><linearGradient id="wg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="var(--flame)" stop-opacity=".28"/><stop offset="1" stop-color="var(--flame)" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#wg)"/><polyline points="${pts.join(" ")}" fill="none" stroke="var(--flame)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${X(wl.length-1).toFixed(1)}" cy="${Y(ys[ys.length-1]).toFixed(1)}" r="4" fill="var(--flame)"/></svg>`;}

/* ================= SESSION (warm-up + main) ================= */
let sess=null,elTimer=null;
function startSession(){const done=S.plan.sessionsDone,wk=weekOf(done),which=todayWhich(done);

  S.route="session";save();render();clearInterval(elTimer);elTimer=setInterval(tick,200);}
function renderSession(){if(!sess)return go("home");
  if(sess.phase==="warm")return renderWarm();
  return renderMain();}

function renderWarm(){const w=WARM[sess.warmIdx],info=BY[w.slug];
  screen.innerHTML=`<div class="pad stack" style="min-height:100%">
    <div class="between"><button class="btn sm ghost" data-cancel="1">‹ Выйти</button><div class="eyebrow">Разминка · ${sess.warmIdx+1}/${WARM.length}</div><button class="btn sm" data-skipwarm="1">Пропустить ⏭</button></div>
    <div class="warmstage">${vhtml(w.slug,"clip warmvid")}</div>
    <div style="text-align:center"><h1>${esc(info.name)}</h1><div class="muted" style="margin-top:4px">${esc(info.muscle)}</div></div>

  </div>`;
  const v=screen.querySelector(".warmvid");if(v){v.play&&v.play().catch(()=>{});}
}
function warmNext(){sess.warmIdx++;if(sess.warmIdx>=WARM.length){startMain();return;}sess.warmEnd=Date.now()+WARM[sess.warmIdx].sec*1000;sess.warmPaused=false;renderWarm();}
function startMain(){sess.phase="main";sess.mainStart=Date.now();beep();toast("Разминка готова! Основная часть 💪");renderMain();}

function renderMain(){
  const doneSets=sess.ex.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);

      <div style="text-align:center"><div class="eyebrow">Тренировка ${sess.which} · нед. ${sess.week}</div><div class="num" id="elapsed" style="font-size:22px;font-weight:800">0:00</div></div>
      <button class="btn sm primary" data-finish="1">Финиш</button></div>
    <div class="card p between"><div class="row"><div style="width:44px;height:44px;position:relative">${ringSVG(totSets?doneSets/totSets:0,44,5,"var(--good)")}</div><div><div style="font-weight:700">${doneSets}/${totSets} подходов</div><div class="faint" style="font-size:12px">${prog(sess.week).ph}</div></div></div>
      <button class="btn sm ghost" data-tech="${sess.ex[0].slug}">Как делать?</button></div>
    ${sess.ex.map((e,ei)=>{const ed=e.sets.filter(s=>s.done).length;
      return `<div class="card p">
        <div class="exhead"><div class="exthumb" data-tech="${e.slug}">${vhtml(e.slug,"")}<span class="pl">▶</span></div>
          <div style="flex:1"><div style="font-weight:700">${esc(e.name)}</div><div class="faint num" style="font-size:12px">${ed}/${e.sets.length} · ${e.kind==="time"?"держать "+e.tgt:e.tgt+" повт."} · отдых ${e.rest}с</div></div>
          ${ed===e.sets.length?'<span class="pill good">Готово ✓</span>':''}</div>
        ${e.gym?`<div class="unit" style="display:grid;grid-template-columns:26px 1fr 1fr 46px;gap:8px;margin-bottom:4px"><span></span><span>кг</span><span>повторы</span><span></span></div>`:``}
        ${e.sets.map((s,si)=>setRow(e,ei,s,si)).join("")}
      </div>`;}).join("")}
  </div>`;
  wireVideos(screen);updElapsed();
}
function setRow(e,ei,s,si){
  if(e.gym) return `<div class="setrow gym ${s.done?'done':''}"><div class="sn num">${si+1}</div>
    <input class="num" inputmode="decimal" placeholder="—" value="${s.weight}" data-in="${ei}:${si}:weight">
    <input class="num" inputmode="numeric" value="${esc(s.reps)}" data-in="${ei}:${si}:reps">
    <button class="chk" data-toggle="${ei}:${si}"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></button></div>`;
  if(e.kind==="time") return `<div class="setrow tm ${s.done?'done':''}"><div class="sn num">${si+1}</div>
    <div class="tgt">⏱ ${esc(s.reps)}</div>
    <button class="chk" data-toggle="${ei}:${si}"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></button></div>`;
  return `<div class="setrow bw ${s.done?'done':''}"><div class="sn num">${si+1}</div>
    <input class="num" inputmode="numeric" value="${esc(s.reps)}" data-in="${ei}:${si}:reps">
    <button class="chk" data-toggle="${ei}:${si}"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></button></div>`;
}
function syncSess(){document.querySelectorAll("[data-in]").forEach(inp=>{const a=inp.dataset.in.split(":"),e=sess.ex[a[0]];if(e&&e.sets[a[1]])e.sets[a[1]][a[2]]=inp.value;});}
function toggleSet(ei,si){syncSess();const s=sess.ex[ei].sets[si];s.done=!s.done;if(s.done)startRest(sess.ex[ei].rest);renderMain();}
function finishSession(){syncSess();const doneSets=[];let vol=0;
  sess.ex.forEach(e=>e.sets.forEach(s=>{if(s.done){doneSets.push(s);vol+=(+s.weight||0)*(parseInt(s.reps)||0);}}));
  if(doneSets.length===0){if(!confirm("Ни одного подхода не отмечено. Выйти без сохранения?"))return;endSession(false);return;}
  const dur=(Date.now()-sess.mainStart)/1000;
  S.history.push({date:todayKey(),name:"Тренировка "+sess.which,which:sess.which,week:sess.week,dur,sets:doneSets.length,volume:vol});
  S.plan.sessionsDone++;endSession(true,{sets:doneSets.length,dur});}
function endSession(saved,sum){clearInterval(elTimer);clearRest();const finished=saved&&S.plan.sessionsDone>=TOTAL_SESSIONS;sess=null;
  if(saved){save();go("home");toast(finished?"🎉 Программа пройдена! Так держать!":`💪 Готово! ${sum.sets} подх. · ${clock(sum.dur)}`);}else{go("home");}}
function updElapsed(){const el=$("#elapsed");if(el&&sess&&sess.mainStart)el.textContent=clock((Date.now()-sess.mainStart)/1000);}

/* rest timer */
let rest=null;
function startRest(sec){rest={total:sec,end:Date.now()+sec*1000,beeped:false};drawRest();restSheet.classList.add("show");}
function clearRest(){rest=null;restSheet.classList.remove("show");}
function restRemain(){return rest?Math.max(0,(rest.end-Date.now())/1000):0;}
function drawRest(){if(!rest)return;const rem=restRemain(),pct=rest.total?rem/rest.total:0;
  restSheet.innerHTML=`<div class="ring">${ringSVG(pct,78,7,rem<=5?"var(--bad)":"var(--flame)")}<div class="t num">${clock(rem)}</div></div>
    <div style="flex:1"><div style="font-weight:700">Отдых</div><div class="faint" style="font-size:12.5px">Готовься к следующему подходу</div></div>
    <div class="row" style="gap:8px"><button class="btn sm" data-rest="-15">−15</button><button class="btn sm" data-rest="15">+15</button><button class="btn sm primary" data-rest="skip">Пропустить</button></div>`;}

/* master tick */
function tick(){
  if(!sess)return;
  if(sess.phase==="warm"){
    if(sess.warmPaused){return;}
    const rem=Math.max(0,(sess.warmEnd-Date.now())/1000);const c=$("#warmc");if(c)c.textContent=Math.ceil(rem);
    if(rem<=0){beep();warmNext();}
    return;
  }
  updElapsed();
  if(rest){const rem=restRemain();const t=restSheet.querySelector(".t");if(t)t.textContent=clock(rem);
    const rings=restSheet.querySelectorAll(".ring svg circle");if(rings[1]){const r=(78-7)/2,c=2*Math.PI*r;rings[1].setAttribute("stroke-dashoffset",(c*(1-(rest.total?rem/rest.total:0))).toFixed(1));rings[1].setAttribute("stroke",rem<=5?"var(--bad)":"var(--flame)");}
    if(rem<=0&&!rest.beeped){rest.beeped=true;beep();toast("⏱ Отдых окончен!");setTimeout(()=>{if(rest&&restRemain()<=0)clearRest();},1200);}
  }
}

/* ---------- technique modal ---------- */
function openTech(slug){const e=BY[slug];if(!e)return;
  sheet.innerHTML=`<button class="close" data-close="1">✕</button><div class="grab"></div>
    <div class="bigwrap">${vhtml(slug,"big")}</div>
    <div class="row" style="justify-content:center;gap:8px;margin-top:10px"><button class="btn sm" data-rate="0.5">🐢 Медленно</button><button class="btn sm act" data-rate="1">▶ Обычно</button></div>
    <h2 style="margin-top:14px">${esc(e.name)}</h2>
    <div class="seg" style="margin:8px 0"><span class="pill flame">${esc(e.muscle)}</span><span class="pill">🎯 ${esc(e.reps)}</span></div>
    <div class="sec"><h3>Как делать</h3><ol class="steps">${e.steps.map(s=>`<li>${esc(s)}</li>`).join("")}</ol></div>
    <div class="sec"><h3>Дыхание</h3><div class="note"><span style="font-size:18px">🌬️</span><div>${esc(e.breath)}</div></div></div>
    <div class="sec"><h3>Частые ошибки</h3><ul class="mis">${e.mis.map(m=>`<li>${esc(m)}</li>`).join("")}</ul></div>`;
  ov.classList.add("show");const bv=sheet.querySelector(".big");if(bv){bv.play&&bv.play().catch(()=>{});}
}
function closeTech(){const bv=sheet.querySelector(".big");if(bv)bv.pause();ov.classList.remove("show");}

/* ---------- events ---------- */
function addFood(name,kcal,protein){const key=todayKey();(S.nutrition[key]=S.nutrition[key]||[]).push({name,kcal,protein});save();renderNutrition();toast("Добавлено ✓");}
document.addEventListener("click",ev=>{
  const b=ev.target.closest("[data-nav],[data-start],[data-tech],[data-lib],[data-cancel],[data-skipwarm],[data-warmnext],[data-warmpause],[data-toggle],[data-finish],[data-rest],[data-addweight],[data-quick],[data-addfood],[data-delfood],[data-savep],[data-export],[data-reset],[data-restart],[data-rate],[data-close]");
  if(!b)return;const d=b.dataset;
  if(d.close!=null||ev.target===ov){/*handled below*/}
  if(d.nav)return go(d.nav);
  if(d.start)return startSession();
  if(d.tech)return openTech(d.tech);
  if(d.close!=null)return closeTech();
  if(d.lib){libFilter=d.lib;renderExercises();return;}
  if(d.cancel){if(confirm("Выйти без сохранения тренировки?"))endSession(false);return;}
  if(d.skipwarm)return startMain();
  if(d.warmnext)return warmNext();
  if(d.warmpause){sess.warmPaused=!sess.warmPaused;if(!sess.warmPaused){sess.warmEnd=Date.now()+(parseInt($("#warmc").textContent)||WARM[sess.warmIdx].sec)*1000;}const btn=$("#wpause");if(btn)btn.textContent=sess.warmPaused?"▶ Продолжить":"⏸ Пауза";return;}
  if(d.toggle){const a=d.toggle.split(":");return toggleSet(+a[0],+a[1]);}
  if(d.finish)return finishSession();
  if(d.rest){if(!rest)return;if(d.rest==="skip"){clearRest();}else{rest.end+=(+d.rest)*1000;if(restRemain()<=0)clearRest();else drawRest();}return;}
  if(d.rate){const bv=sheet.querySelector(".big");if(bv)bv.playbackRate=parseFloat(d.rate);sheet.querySelectorAll("[data-rate]").forEach(x=>x.classList.remove("act"));b.classList.add("act");return;}
  if(d.addweight){const v=parseFloat($("#w_val").value);if(!v)return toast("Введи вес");const k=todayKey(),ex=S.weightLog.find(w=>w.date===k);if(ex)ex.kg=v;else S.weightLog.push({date:k,kg:v});if(S.profile)S.profile.weight=v;save();renderProgress();toast("Вес записан ✓");return;}
  if(d.quick!=null){const q=QUICK[+d.quick];addFood(q.name,q.kcal,q.protein);return;}
  if(d.addfood){const n=$("#f_name").value.trim()||"Еда",k=+$("#f_kcal").value||0,p=+$("#f_prot").value||0;if(!k&&!p)return toast("Укажи калории");addFood(n,k,p);return;}
  if(d.delfood!=null){(S.nutrition[todayKey()]||[]).splice(+d.delfood,1);save();renderNutrition();return;}
  if(d.savep){const p=S.profile;p.name=$("#p_name").value.trim()||p.name;p.age=+$("#p_age").value||p.age;p.height=+$("#p_h").value||p.height;p.weight=+$("#p_w").value||p.weight;p.goal=segVal("#p_goal");p.restDefault=+$("#p_rest").value||90;save();renderProfile();toast("Сохранено ✓");return;}
  if(d.export){const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="fitcoach-backup.json";a.click();toast("Копия сохранена");return;}
  if(d.restart){if(confirm("Начать программу с 1-й недели заново?")){S.plan={startDate:todayKey(),sessionsDone:0};save();go("home");toast("Программа сброшена на неделю 1");}return;}
  if(d.reset){if(confirm("Удалить все данные и начать заново?")){localStorage.removeItem(KEY);S=freshState();applyTheme();go("onboarding");}return;}
});
ov.addEventListener("click",e=>{if(e.target===ov)closeTech();});

function applyTheme(){const r=document.documentElement;if(S.theme==="auto")r.removeAttribute("data-theme");else r.setAttribute("data-theme",S.theme);}
applyTheme();render();
})();
</script>
